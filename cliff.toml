# git-cliff configuration for Kairox
# https://git-cliff.vercel.app/docs/configuration

[changelog]
header = """\
# Changelog\n\n\
All notable changes to this project will be documented in this file.\n\n\
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n\n\
"""
body = """\
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}\
{% else %}\
## [Unreleased]\
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\n\n\
### {{ group | striptags | trim }}\n\n\
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message }}\n\
{% endfor -%}\
{% endfor -%}\
\n\
"""
trim = true
footer = """\
<!-- generated by git-cliff -->\
"""
[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->🚀 Features" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^perf", group = "<!-- 2 -->⚡ Performance" },
    { message = "^doc", group = "<!-- 3 -->📚 Documentation" },
    { message = "^test", group = "<!-- 4 -->🧪 Testing" },
    { message = "^refactor", group = "<!-- 5 -->🧹 Refactor" },
    { message = "^style", group = "<!-- 6 -->🎨 Styling" },
    { message = "^ci", group = "<!-- 7 -->👷 CI" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps", group = "<!-- 8 -->📦 Dependencies" },
    { message = "^chore", group = "<!-- 9 -->🔧 Miscellaneous Tasks" },
    { body = ".*security", group = "<!-- 10 -->🔒 Security" },
    { message = "^merge", skip = true },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
topo_order = false
