[connect]
timeout_ms = 10000

[scenario]
name = "Audit sessions lifecycle"
fail_fast = true
global_timeout_ms = 60000

[[step]]
name = "wait for sidebar"
action = "wait"
selector = "[data-test='sessions-sidebar']"
timeout_ms = 15000

[[step]]
name = "project create trigger visible"
action = "assert-visible"
target = "[data-test='project-create-trigger']"

[[step]]
name = "open project create menu"
action = "click"
target = "[data-test='project-create-trigger']"

[[step]]
name = "blank project action visible"
action = "assert-visible"
target = "[data-test='project-create-blank']"

[[step]]
name = "import folder action visible"
action = "assert-visible"
target = "[data-test='project-import-folder']"

[[step]]
name = "new session button visible"
action = "assert-visible"
target = "[data-test='new-session-btn']"

[[step]]
name = "open new session dialog"
action = "click"
target = "[data-test='new-session-btn']"

[[step]]
name = "new session dialog visible"
action = "assert-visible"
target = "[data-test='new-session-dialog']"

[[step]]
name = "create session button visible"
action = "assert-visible"
target = "[data-test='create-session-btn']"

[[step]]
name = "create a session"
action = "click"
target = "[data-test='create-session-btn']"

[[step]]
name = "session item visible"
action = "assert-visible"
target = "[data-test='session-item']"

[[step]]
name = "rename button visible"
action = "assert-visible"
target = "[data-test='session-rename-btn']"

[[step]]
name = "open rename controls"
action = "click"
target = "[data-test='session-rename-btn']"

[[step]]
name = "rename input visible"
action = "assert-visible"
target = "[data-test='session-rename-input']"

[[step]]
name = "rename confirm visible"
action = "assert-visible"
target = "[data-test='session-rename-confirm']"

[[step]]
name = "confirm unchanged rename"
action = "click"
target = "[data-test='session-rename-confirm']"

[[step]]
name = "wait for delete button after rename"
action = "wait"
selector = "[data-test='session-delete-btn']"
timeout_ms = 5000

[[step]]
name = "delete button visible"
action = "assert-visible"
target = "[data-test='session-delete-btn']"

[[step]]
name = "open delete confirmation"
action = "click"
target = "[data-test='session-delete-btn']"

[[step]]
name = "confirm delete visible"
action = "assert-visible"
target = "[data-test='session-delete-confirm']"

[[step]]
name = "confirm session delete"
action = "click"
target = "[data-test='session-delete-confirm']"

[[step]]
name = "sidebar restored after delete"
action = "assert-visible"
target = "[data-test='sessions-sidebar']"

[[step]]
name = "active session stable after delete"
action = "wait"
selector = ".session-item.active"
timeout_ms = 10000
