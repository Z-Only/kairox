[connect]
timeout_ms = 10000

[scenario]
name = "Attachment live model path"
fail_fast = true
global_timeout_ms = 90000

[[step]]
name = "wait for app ready"
action = "wait"
selector = "[data-test='sessions-sidebar']"
timeout_ms = 15000

[[step]]
name = "remember previous session route"
action = "eval"
script = """
(() => {
  const hashParts = window.location.hash.split("/");
  window.__kairoxPilotPreviousSessionId = hashParts[1] === "workbench" ? hashParts[2] : null;
  return window.__kairoxPilotPreviousSessionId ?? "";
})()
"""

[[step]]
name = "start live attachment session"
action = "click"
target = "[data-test='new-session-btn']"

[[step]]
name = "wait for chat input"
action = "wait"
selector = "textarea[data-test='message-input']"
timeout_ms = 15000

[[step]]
name = "open live model selector"
action = "click"
target = "[data-test='chat-model-trigger']"

[[step]]
name = "select live model for pending attachment chat"
action = "click"
target = "[data-test='chat-model-option-github-gpt4o-mini']"

[[step]]
name = "assert pending attachment composer uses live model"
action = "eval"
script = """
(() => {
  const trigger = document.querySelector("[data-test='chat-model-trigger']");
  const label = trigger?.textContent ?? "";
  if (!label.includes("4o Mini") || label.includes("Fake")) {
    throw new Error(`pending attachment composer is not using live model: ${label}`);
  }
  return label;
})()
"""

[[step]]
name = "fill attachment session materialization prompt"
action = "fill"
target = "textarea[data-test='message-input']"
value = "Initialize live attachment pilot session"

[[step]]
name = "materialize live attachment session"
action = "click"
target = "[data-test='send-button']"

[[step]]
name = "wait for live attachment session activation"
action = "eval"
timeout_ms = 15000
script = """
(async () => {
  const previousSessionId = window.__kairoxPilotPreviousSessionId ?? null;
  const deadline = Date.now() + 15000;

  while (Date.now() < deadline) {
    const hashParts = window.location.hash.split("/");
    const routeSessionId = hashParts[1] === "workbench" ? hashParts[2] : null;
    const activeSessionId = localStorage.getItem("kairox.last-active-session-id");
    if (
      routeSessionId &&
      routeSessionId !== previousSessionId &&
      activeSessionId === routeSessionId
    ) {
      return routeSessionId;
    }
    await new Promise((resolve) => setTimeout(resolve, 100));
  }

  throw new Error("new live attachment session did not become active after materialization");
})()
"""

[[step]]
name = "wait for materialization response to finish"
action = "eval"
timeout_ms = 70000
script = """
(async () => {
  const deadline = Date.now() + 70000;

  while (Date.now() < deadline) {
    const error = document.querySelector("[data-test='error-banner'], [data-error='true']");
    if (error) {
      throw new Error(`live attachment materialization failed: ${error.textContent?.trim() ?? ""}`);
    }

    const messages = Array.from(
      document.querySelectorAll("[data-test='chat-message'][data-role='assistant'] .message-content")
    );
    const stream = document.querySelector("[data-test='stream-indicator']");
    if (messages.length > 0 && !stream) {
      return messages.at(-1)?.textContent ?? "";
    }
    await new Promise((resolve) => setTimeout(resolve, 200));
  }

  throw new Error("live attachment materialization response did not finish");
})()
"""

[[step]]
name = "remember pre-live attachment assistant count"
action = "eval"
script = """
(() => {
  window.__kairoxPilotPreLiveAttachmentAssistantCount = document.querySelectorAll(
    "[data-test='chat-message'][data-role='assistant'] .message-content"
  ).length;
  return window.__kairoxPilotPreLiveAttachmentAssistantCount;
})()
"""

[[step]]
name = "send live attachment over IPC"
action = "eval"
script = """
(async () => {
  await window.__TAURI_INTERNALS__.invoke("send_message", {
    content: "Use the embedded attachment block above. Do not call tools or read files. Reply with only the sentinel value shown in that block, with no prose.",
    attachments: [{
      path: "apps/agent-gui/e2e-pilot/fixtures/live-model-attachment.txt",
      name: "live-model-attachment.txt",
      mime_type: "text/plain",
    }],
  });
  return "sent";
})()
"""

[[step]]
name = "wait for enriched attachment user message"
action = "eval"
timeout_ms = 15000
script = """
(async () => {
  const deadline = Date.now() + 15000;

  while (Date.now() < deadline) {
    const messages = Array.from(document.querySelectorAll(".message-user .message-content"));
    const text = messages.at(-1)?.textContent ?? "";
    if (
      text.includes("live-model-attachment.txt") &&
      text.includes("KAIROX_PILOT_ATTACHMENT_7F3C9A")
    ) {
      return text;
    }
    await new Promise((resolve) => setTimeout(resolve, 100));
  }

  throw new Error("enriched attachment user message did not appear");
})()
"""

[[step]]
name = "wait for live attachment assistant response"
action = "eval"
timeout_ms = 70000
script = """
(async () => {
  const previous = window.__kairoxPilotPreLiveAttachmentAssistantCount ?? 0;
  const deadline = Date.now() + 70000;

  while (Date.now() < deadline) {
    const messages = Array.from(
      document.querySelectorAll("[data-test='chat-message'][data-role='assistant'] .message-content")
    );
    if (messages.length > previous) {
      return messages.at(-1)?.textContent ?? "";
    }
    await new Promise((resolve) => setTimeout(resolve, 200));
  }

  throw new Error("new live attachment assistant response did not appear");
})()
"""

[[step]]
name = "wait for live attachment stream to finish"
action = "wait"
selector = "[data-test='stream-indicator']"
gone = true
timeout_ms = 70000

[[step]]
name = "assert live attachment sentinel"
action = "eval"
script = """
(() => {
  const error = document.querySelector("[data-test='error-banner'], [data-error='true']");
  if (error) {
    throw new Error(`live attachment failed: ${error.textContent?.trim() ?? ""}`);
  }

  const messages = Array.from(
    document.querySelectorAll("[data-test='chat-message'][data-role='assistant'] .message-content")
  );
  const previous = window.__kairoxPilotPreLiveAttachmentAssistantCount ?? 0;
  const text = messages.slice(previous).map((message) => message.textContent ?? "").join("\\n");
  if (!text.includes("KAIROX_PILOT_ATTACHMENT_7F3C9A")) {
    throw new Error(`live attachment response did not include the attached sentinel: ${text}`);
  }
  return text;
})()
"""

[[step]]
name = "open task steps tab"
action = "click"
target = "[data-test='trace-tab-tasks']"

[[step]]
name = "attachment task completed"
action = "wait"
selector = "[data-test='task-node'].task-state-completed"
timeout_ms = 15000

[[step]]
name = "assert no failed attachment task"
action = "eval"
script = """
(() => {
  if (document.querySelector("[data-test='task-node'].task-state-failed")) {
    throw new Error("live attachment task failed");
  }
  return "task completed";
})()
"""
