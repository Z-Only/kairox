[connect]
timeout_ms = 10000

[scenario]
name = "Audit chat streaming"
fail_fast = true
global_timeout_ms = 90000

[[step]]
name = "new session button visible"
action = "assert-visible"
target = "[data-test='new-session-btn']"

[[step]]
name = "click new session"
action = "click"
target = "[data-test='new-session-btn']"

[[step]]
name = "wait for chat input"
action = "wait"
selector = "textarea[data-test='message-input']"
timeout_ms = 15000

[[step]]
name = "empty state visible"
action = "wait"
selector = "[data-test='chat-empty-state']"
timeout_ms = 15000

[[step]]
name = "chat model trigger visible"
action = "assert-visible"
target = "[data-test='chat-model-trigger']"

[[step]]
name = "send button visible"
action = "assert-visible"
target = "[data-test='send-button']"

[[step]]
name = "chat action button visible"
action = "assert-visible"
target = "[data-test='send-button'], [data-test='cancel-button']"

[[step]]
name = "trace timeline visible"
action = "assert-visible"
target = "[data-test='trace-timeline']"

[[step]]
name = "fill audit attachment prompt"
action = "fill"
target = "textarea[data-test='message-input']"
value = "Pilot attachment IPC coverage from audit-chat"

[[step]]
name = "materialize audit chat session"
action = "click"
target = "[data-test='send-button']"

[[step]]
name = "wait for materialized audit chat session"
action = "eval"
timeout_ms = 15000
script = """
(async () => {
  const deadline = Date.now() + 15000;

  while (Date.now() < deadline) {
    const hashParts = window.location.hash.split("/");
    const routeSessionId = hashParts[1] === "workbench" ? hashParts[2] : null;
    const activeSessionId = localStorage.getItem("kairox.last-active-session-id");
    if (routeSessionId && activeSessionId === routeSessionId) {
      return routeSessionId;
    }
    await new Promise((resolve) => setTimeout(resolve, 100));
  }

  throw new Error("audit chat session did not become active after send");
})()
"""

[[step]]
name = "wait for materialized stream to finish"
action = "wait"
selector = "[data-test='stream-indicator']"
gone = true
timeout_ms = 15000

[[step]]
name = "send audit attachment over IPC"
action = "eval"
script = """
(async () => {
  await window.__TAURI_INTERNALS__.invoke("send_message", {
    content: "Pilot attachment IPC coverage from audit-chat",
    attachments: [{
      path: "apps/agent-gui/e2e-pilot/audit-chat.toml",
      name: "audit-chat.toml",
      mime_type: "application/toml",
    }],
  });
  return "sent";
})()
"""

[[step]]
name = "wait for audit attachment user message"
action = "eval"
timeout_ms = 15000
script = """
(async () => {
  const deadline = Date.now() + 15000;

  while (Date.now() < deadline) {
    const messages = Array.from(document.querySelectorAll(".message-user .message-content"));
    const text = messages.find((message) =>
      message.textContent?.includes("Pilot attachment IPC coverage from audit-chat")
    )?.textContent ?? "";
    if (text) {
      return text;
    }
    await new Promise((resolve) => setTimeout(resolve, 100));
  }

  throw new Error("audit attachment user message did not appear");
})()
"""

[[step]]
name = "assert audit attachment message keeps display content"
action = "eval"
script = """
(() => {
  const messages = Array.from(document.querySelectorAll(".message-user .message-content"));
  const text = messages.find((message) =>
    message.textContent?.includes("Pilot attachment IPC coverage from audit-chat")
  )?.textContent ?? "";
  if (!text.includes("Pilot attachment IPC coverage from audit-chat")) {
    throw new Error(`attachment message missing prompt text: ${text}`);
  }
  if (text.includes("send audit attachment over IPC")) {
    throw new Error(`attachment message leaked real file content: ${text}`);
  }
  return text;
})()
"""

[[step]]
name = "open task steps tab"
action = "click"
target = "[data-test='trace-tab-tasks']"

[[step]]
name = "task steps visible"
action = "assert-visible"
target = "[data-test='task-steps']"

[[step]]
name = "message list visible"
action = "assert-visible"
target = "[data-test='message-list']"

[[step]]
name = "delete audit chat session"
action = "click"
target = ".session-item.active [data-test='session-archive-btn']"

[[step]]
name = "confirm audit chat cleanup"
action = "click"
target = ".session-item.active [data-test='session-archive-btn']"

[[step]]
name = "sidebar restored after chat cleanup"
action = "assert-visible"
target = "[data-test='sessions-sidebar']"
