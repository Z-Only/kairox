[connect]
timeout_ms = 10000

[scenario]
name = "Audit trajectory viewer visibility"
fail_fast = true
global_timeout_ms = 60000

[[step]]
name = "wait for app shell"
action = "wait"
selector = "[data-test='app-shell']"
timeout_ms = 15000

[[step]]
name = "navigate to workbench"
action = "click"
target = "[data-test='nav-workbench']"

[[step]]
name = "workbench visible"
action = "assert-visible"
target = "[data-test='view-workbench']"

[[step]]
name = "click new session"
action = "click"
target = "[data-test='new-session-btn']"

[[step]]
name = "wait for message input"
action = "wait"
selector = "textarea[data-test='message-input']"
timeout_ms = 15000

[[step]]
name = "fill session prompt"
action = "fill"
target = "textarea[data-test='message-input']"
value = "Pilot trajectory audit probe"

[[step]]
name = "materialize session"
action = "click"
target = "[data-test='send-button']"

[[step]]
name = "wait for session to become active"
action = "eval"
timeout_ms = 15000
script = """
(async () => {
  const deadline = Date.now() + 15000;

  while (Date.now() < deadline) {
    const hashParts = window.location.hash.split("/");
    const routeSessionId = hashParts[1] === "workbench" ? hashParts[2] : null;
    const activeSessionId = localStorage.getItem("kairox.last-active-session-id");
    if (routeSessionId && activeSessionId === routeSessionId) {
      return routeSessionId;
    }
    await new Promise((resolve) => setTimeout(resolve, 100));
  }

  throw new Error("session did not become active");
})()
"""

[[step]]
name = "wait for trace timeline panel"
action = "wait"
selector = "[data-test='trace-timeline']"
timeout_ms = 15000

[[step]]
name = "click trajectory tab"
action = "click"
target = "[data-test='trace-tab-trajectory']"

[[step]]
name = "wait for trajectory viewer"
action = "wait"
selector = "[data-test='trajectory-viewer']"
timeout_ms = 10000

[[step]]
name = "trajectory viewer visible"
action = "assert-visible"
target = "[data-test='trajectory-viewer']"

[[step]]
name = "verify trajectory viewer content or empty state"
action = "eval"
script = """
(() => {
  const viewer = document.querySelector("[data-test='trajectory-viewer']");
  if (!viewer) throw new Error("trajectory-viewer not found in DOM");

  const cards = viewer.querySelectorAll("[data-test='trajectory-card']");
  const steps = viewer.querySelectorAll("[data-test='trajectory-step']");
  const textContent = viewer.textContent?.trim() ?? "";

  return {
    hasCards: cards.length > 0,
    hasSteps: steps.length > 0,
    isEmpty: textContent.length === 0 || cards.length === 0,
    cardCount: cards.length,
    stepCount: steps.length,
  };
})()
"""
