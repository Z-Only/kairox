[connect]
timeout_ms = 10000

[scenario]
name = "Chat flow"
fail_fast = true
global_timeout_ms = 60000

[[step]]
name = "wait for app ready"
action = "wait"
selector = "[data-test='sessions-sidebar']"
timeout_ms = 15000

[[step]]
name = "start text chat session"
action = "click"
target = "[data-test='new-session-btn']"

[[step]]
name = "wait for text chat input"
action = "wait"
selector = "textarea[data-test='message-input']"
timeout_ms = 15000

[[step]]
name = "fill chat textarea"
action = "fill"
target = "textarea[data-test='message-input']"
value = "Hello agent!"

[[step]]
name = "assert textarea value updated"
action = "assert-value"
target = "textarea[data-test='message-input']"
expected = "Hello agent!"

[[step]]
name = "send chat message"
action = "click"
target = "[data-test='send-button']"

[[step]]
name = "wait for user message"
action = "wait"
selector = ".message-user .message-content"
timeout_ms = 15000

[[step]]
name = "assert user message text"
action = "eval"
script = """
(() => {
  const messages = Array.from(document.querySelectorAll(".message-user .message-content"));
  const text = messages.at(-1)?.textContent ?? "";
  if (text !== "Hello agent!") {
    throw new Error(`latest user message mismatch: ${text}`);
  }
  return text;
})()
"""

[[step]]
name = "remember text chat session"
action = "eval"
script = """
(() => {
  const current = localStorage.getItem("kairox.last-active-session-id") || window.location.hash;
  if (!current) {
    throw new Error("missing active text chat session id");
  }
  window.__pilotChatFlowTextSession = current;
  return current;
})()
"""

[[step]]
name = "start attachment session"
action = "click"
target = "[data-test='new-session-btn']"

[[step]]
name = "wait for attachment chat input"
action = "wait"
selector = "textarea[data-test='message-input']"
timeout_ms = 15000

[[step]]
name = "fill attachment chat textarea"
action = "fill"
target = "textarea[data-test='message-input']"
value = "Create attachment session shell"

[[step]]
name = "materialize attachment session"
action = "click"
target = "[data-test='send-button']"

[[step]]
name = "wait for attachment session to activate"
action = "eval"
timeout_ms = 15000
script = """
(async () => {
  const previous = window.__pilotChatFlowTextSession;
  const deadline = Date.now() + 15000;

  while (Date.now() < deadline) {
    const current = localStorage.getItem("kairox.last-active-session-id") || window.location.hash;
    if (current && current !== previous) {
      return current;
    }
    await new Promise((resolve) => setTimeout(resolve, 100));
  }

  throw new Error("attachment session did not become active after send");
})()
"""

[[step]]
name = "send chat attachment over IPC"
action = "eval"
script = """
(async () => {
  const repoRoot = localStorage.getItem("kairox.pilot.repoRoot");
  if (!repoRoot) {
    throw new Error("pilot repo root is not registered");
  }
  const attachmentPath = `${repoRoot}/apps/agent-gui/e2e-pilot/fixtures/live-model-attachment.txt`;
  window.__pilotChatFlowAttachmentSentinel = "KAIROX_PILOT_ATTACHMENT_7F3C9A";
  await window.__TAURI_INTERNALS__.invoke("send_message", {
    content: "Pilot attachment IPC coverage from chat-flow",
    attachments: [{
      path: attachmentPath,
      name: "live-model-attachment.txt",
      mime_type: "text/plain",
    }],
  });
  return "sent";
})()
"""

[[step]]
name = "wait for attachment user message"
action = "eval"
script = """
(async () => {
  const deadline = Date.now() + 8000;

  while (Date.now() < deadline) {
    const messages = Array.from(document.querySelectorAll(".message-user .message-content"));
    const text = messages.find((message) =>
      message.textContent?.includes("Pilot attachment IPC coverage from chat-flow")
    )?.textContent ?? "";
    if (text) {
      return text;
    }
    await new Promise((resolve) => setTimeout(resolve, 100));
  }

  throw new Error("attachment user message did not appear");
})()
"""

[[step]]
name = "assert attachment message keeps display content"
action = "eval"
script = """
(() => {
  const sentinel = window.__pilotChatFlowAttachmentSentinel;
  const messages = Array.from(document.querySelectorAll(".message-user .message-content"));
  const text = messages.find((message) =>
    message.textContent?.includes("Pilot attachment IPC coverage from chat-flow")
  )?.textContent ?? "";
  if (!text.includes("Pilot attachment IPC coverage from chat-flow")) {
    throw new Error(`attachment message missing prompt text: ${text}`);
  }
  if (text.includes(sentinel)) {
    throw new Error(`attachment message leaked enriched file content: ${text}`);
  }
  return text;
})()
"""

[[step]]
name = "assert attachment trace includes file content"
action = "eval"
timeout_ms = 15000
script = """
(async () => {
  const sentinel = window.__pilotChatFlowAttachmentSentinel;
  const sessionId = localStorage.getItem("kairox.last-active-session-id");
  if (!sessionId) {
    throw new Error("missing active attachment session id");
  }

  const deadline = Date.now() + 15000;
  while (Date.now() < deadline) {
    const trace = await window.__TAURI_INTERNALS__.invoke("export_trace", { sessionId });
    const userMessages = (trace.events ?? [])
      .map((event) => event.payload)
      .filter((payload) => payload?.type === "UserMessageAdded");
    const attachmentMessage = userMessages.find((payload) =>
      payload.display_content === "Pilot attachment IPC coverage from chat-flow"
    );

    if (attachmentMessage) {
      const content = attachmentMessage.content ?? "";
      if (!content.includes(sentinel)) {
        throw new Error(`attachment file content was not enriched into trace: ${content}`);
      }
      if (content.includes("(read error)")) {
        throw new Error(`attachment trace recorded read error: ${content}`);
      }
      return content;
    }

    await new Promise((resolve) => setTimeout(resolve, 100));
  }

  throw new Error("attachment UserMessageAdded trace event did not appear");
})()
"""
