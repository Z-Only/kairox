changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: Breaking changes
      labels:
        - breaking-change
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - fix
        - bug
    - title: Documentation
      labels:
        - documentation
    - title: Tooling and CI
      labels:
        - ci
        - tooling
    - title: Dependencies
      labels:
        - dependencies
    - title: Other Changes
      labels:
        - "*"
