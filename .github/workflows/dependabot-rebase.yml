name: Dependabot Rebase

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase-dependabot-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Update open Dependabot PRs
        run: |
          prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --author "app/dependabot" --state open --json number,headRefName --jq '.[] | @base64')
          for pr_data in $prs; do
            number=$(echo "$pr_data" | base64 -d | jq -r '.number')
            branch=$(echo "$pr_data" | base64 -d | jq -r '.headRefName')

            echo "Merging main into $branch (PR #$number)"
            result=$(gh api "repos/$GITHUB_REPOSITORY/merges" \
              -f base="$branch" \
              -f head="main" \
              -f commit_message="Merge branch 'main' into $branch" 2>&1) || true

            # Close and reopen to trigger CI — commits created via GITHUB_TOKEN
            # do not trigger subsequent workflow runs.
            if echo "$result" | grep -q '"sha"'; then
              echo "Merge succeeded, closing and reopening PR #$number to trigger CI"
              gh pr close "$number" --repo "$GITHUB_REPOSITORY" || true
              sleep 2
              gh pr reopen "$number" --repo "$GITHUB_REPOSITORY" || true
            else
              echo "No merge needed or merge failed for PR #$number"
            fi

            sleep 2
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
