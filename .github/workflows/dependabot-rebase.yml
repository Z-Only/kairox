name: Dependabot Rebase

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  rebase-dependabot-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Update open Dependabot PRs
        run: |
          prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --author "app/dependabot" --state open --json headRefName --jq '.[].headRefName')
          for branch in $prs; do
            echo "Merging main into $branch"
            gh api "repos/$GITHUB_REPOSITORY/merges" \
              -f base="$branch" \
              -f head="main" \
              -f commit_message="Merge branch 'main' into $branch" || true
            sleep 2
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
