name: Dependabot Rebase

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  rebase-dependabot-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Rebase open Dependabot PRs
        run: |
          prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --author "app/dependabot" --state open --json number --jq '.[].number')
          for pr in $prs; do
            echo "Requesting rebase for PR #$pr"
            gh pr comment "$pr" --repo "$GITHUB_REPOSITORY" --body "@dependabot rebase" || true
            sleep 2
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
