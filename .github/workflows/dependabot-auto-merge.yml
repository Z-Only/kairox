name: Dependabot Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request') ||
      (github.event_name == 'check_suite' && github.event.check_suite.pull_requests[0].number)
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;
            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'workflow_run') {
              const prs = context.payload.workflow_run.pull_requests || [];
              if (prs.length > 0) prNumber = prs[0].number;
            } else if (context.eventName === 'check_suite') {
              const prs = context.payload.check_suite.pull_requests || [];
              if (prs.length > 0) prNumber = prs[0].number;
            }
            core.setOutput('number', prNumber ? String(prNumber) : '');

      - name: Fetch PR info
        id: info
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const isDependabot = pr.user?.login === 'dependabot[bot]';
            const isOpen = pr.state === 'open';
            const headSha = pr.head.sha;

            const { data: combined } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
            });

            const checksOk = combined.state === 'success';
            core.setOutput('dependabot', String(isDependabot));
            core.setOutput('open', String(isOpen));
            core.setOutput('checks_ok', String(checksOk));
            core.setOutput('number', String(prNumber));

      - name: Enable auto-merge
        if: steps.info.outputs.dependabot == 'true' && steps.info.outputs.open == 'true' && steps.info.outputs.checks_ok == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const query = `
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                  pullRequest { number autoMergeRequest { enabledAt } }
                }
              }
            `;

            const prNumber = Number('${{ steps.info.outputs.number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            try {
              await github.graphql(query, { pullRequestId: pr.node_id });
            } catch (error) {
              core.info(`Auto-merge may already be enabled or not applicable: ${error.message}`);
            }
