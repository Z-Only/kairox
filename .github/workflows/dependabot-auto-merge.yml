name: Dependabot Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: |
      (github.event_name == 'pull_request' && (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'app/dependabot')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request') ||
      (github.event_name == 'check_suite' && github.event.check_suite.pull_requests[0].number)
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            let prNumber = null;
            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'workflow_run') {
              const prs = context.payload.workflow_run.pull_requests || [];
              if (prs.length > 0) prNumber = prs[0].number;
            } else if (context.eventName === 'check_suite') {
              const prs = context.payload.check_suite.pull_requests || [];
              if (prs.length > 0) prNumber = prs[0].number;
            }
            core.setOutput('number', prNumber ? String(prNumber) : '');

      - name: Fetch PR info
        id: info
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const author = pr.user?.login || '';
            const isDependabot = author === 'dependabot[bot]' || author === 'app/dependabot';
            const isOpen = pr.state === 'open';
            const isDraft = !!pr.draft;
            const mergeState = pr.mergeable_state || '';
            const headSha = pr.head.sha;

            const { data: combined } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
            });

            const checksOk = combined.state === 'success';
            const clean = mergeState === 'clean' || mergeState === 'unstable' || mergeState === 'has_hooks';
            core.info(`PR #${prNumber} author=${author} mergeState=${mergeState} checks=${combined.state}`);
            core.setOutput('dependabot', String(isDependabot));
            core.setOutput('open', String(isOpen));
            core.setOutput('draft', String(isDraft));
            core.setOutput('checks_ok', String(checksOk));
            core.setOutput('clean', String(clean));
            core.setOutput('number', String(prNumber));

      - name: Merge PR
        if: steps.info.outputs.dependabot == 'true' && steps.info.outputs.open == 'true' && steps.info.outputs.draft == 'false' && steps.info.outputs.checks_ok == 'true' && steps.info.outputs.clean == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = Number('${{ steps.info.outputs.number }}');
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              core.info(`Merged PR #${prNumber}`);
            } catch (error) {
              core.info(`Merge skipped or failed: ${error.message}`);
            }
