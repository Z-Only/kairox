name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "README.md"
      - "bun.lock"
      - "docs/assets/**"
      - "package.json"
      - "site/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build VitePress site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: bun ci

      - name: Fetch latest release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p site/.vitepress/cache
          if gh release view --repo "${{ github.repository }}" --json tagName,publishedAt,assets > site/.vitepress/cache/release.json; then
            echo "Wrote site/.vitepress/cache/release.json"
          else
            echo "No release available yet; writing empty fallback"
            echo '{}' > site/.vitepress/cache/release.json
          fi

      - name: Build site
        run: bun run site:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
