name: Release Build

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/**"

permissions:
  contents: write

jobs:
  publish-release:
    name: Publish release notes
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install tooling deps
        run: pnpm install --frozen-lockfile

      - name: Generate release notes with git-cliff
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Find the previous tag to set the commit range
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ]; then
            # No previous tag, generate from the beginning
            BODY=$(git cliff --strip header "${TAG}")
          else
            BODY=$(git cliff --strip header "${PREV_TAG}..${TAG}")
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo ""
            echo "---"
            echo ""
            echo "## 📦 Installation"
            echo ""
            echo "| Platform | Download |"
            echo "|----------|----------|"
            echo "| macOS (Apple Silicon) | \`Kairox-${TAG}-macos-aarch64.dmg\` |"
            echo "| Linux (x86_64) | \`Kairox-${TAG}-linux-x86_64.AppImage\` or \`.deb\` |"
            echo "| Windows (x86_64) | \`Kairox-${TAG}-windows-x86_64.msi\` or setup \`.exe\` |"
            echo "| Terminal (any) | \`Kairox-TUI-${TAG}-<os>-<arch>.tar.gz\` |"
            echo ""
            echo "Checksums: see the \`SHA256SUMS.txt\` asset."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true

  tui-build:
    name: TUI build (${{ matrix.os }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build TUI
        run: cargo build -p agent-tui --release

      - name: Package TUI (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          KAIROX_OS: ${{ runner.os == 'macOS' && 'macos' || 'linux' }}
          KAIROX_ARCH: ${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}
        run: |
          mkdir -p dist
          tar -czf "dist/Kairox-TUI-${GITHUB_REF_NAME}-${KAIROX_OS}-${KAIROX_ARCH}.tar.gz" \
            -C target/release agent-tui

      - name: Package TUI (Windows)
        if: runner.os == 'Windows'
        env:
          KAIROX_ARCH: x86_64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/release/agent-tui.exe `
            -DestinationPath "dist/Kairox-TUI-${env:GITHUB_REF_NAME}-windows-${env:KAIROX_ARCH}.zip" -Force

      - name: Upload TUI package to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*

  tauri-build:
    name: Tauri build (${{ matrix.os }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install repo tooling deps
        run: pnpm install --frozen-lockfile

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: apps/agent-gui
          tagName: ${{ github.ref_name }}
          releaseName: "Kairox ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          assetNamePattern: Kairox_${{ github.ref_name }}_[platform]_[arch][ext]
          updaterJsonPreferNsis: true

  checksums:
    name: Generate SHA256 checksums
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [tui-build, tauri-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip *.dmg *.msi *.AppImage* *.deb *.rpm 2>/dev/null \
            | sort > ../SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat ../SHA256SUMS.txt

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: SHA256SUMS.txt

  # Smoke test for workflow changes: runs on PRs that modify workflow files
  # to validate that all actions used in release-build.yml can initialize and
  # the core build toolchain works, without actually publishing a release.
  workflow-smoke-test:
    name: Workflow smoke test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Linux system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install repo tooling deps
        run: pnpm install --frozen-lockfile

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Verify git-cliff works
        run: |
          # In PR context HEAD may be a merge commit; use origin/main as the range
          git cliff --strip header origin/main..HEAD || git cliff --strip header HEAD~1..HEAD || git cliff --strip header --unreleased

      - name: Build TUI (release)
        run: cargo build -p agent-tui --release

      - name: Build GUI web
        working-directory: apps/agent-gui
        run: pnpm run build
