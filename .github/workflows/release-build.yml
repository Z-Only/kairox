name: Release Build

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/**"

permissions:
  contents: write

jobs:
  publish-release:
    name: Publish release notes
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install tooling deps
        run: bun ci

      - name: Generate release notes with git-cliff
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Find the previous tag to set the commit range
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "^${TAG}$" | tail -1)
          if [ "$PREV_TAG" = "$TAG" ]; then
            # No previous tag, generate from the beginning
            BODY=$(git cliff --strip header "${TAG}")
          else
            BODY=$(git cliff --strip header "${PREV_TAG}..${TAG}")
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo ""
            echo "---"
            echo ""
            echo "## 📦 Installation"
            echo ""
            echo "| Platform | Download |"
            echo "|----------|----------|"
            echo "| macOS (Apple Silicon) | \`Kairox_${TAG}_darwin_aarch64.dmg\` |"
            echo "| macOS (Apple Silicon) | \`Kairox_${TAG}_darwin_aarch64.app.tar.gz\` (updater) |"
            echo "| Linux (x86_64) | \`Kairox_${TAG}_linux_amd64.AppImage\` or \`.deb\` |"
            echo "| Windows (x86_64) | \`Kairox_${TAG}_windows_x64.msi\` or \`.exe\` |"
            echo "| Terminal (macOS ARM) | \`Kairox-TUI-${TAG}-macos-aarch64.tar.gz\` |"
            echo "| Terminal (macOS Intel) | \`Kairox-TUI-${TAG}-macos-x86_64.tar.gz\` |"
            echo "| Terminal (Linux) | \`Kairox-TUI-${TAG}-linux-x86_64.tar.gz\` |"
            echo "| Terminal (Windows) | \`Kairox-TUI-${TAG}-windows-x86_64.zip\` |"
            echo ""
            echo "Checksums: see the \`SHA256SUMS.txt\` asset."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true

  tui-build:
    name: TUI build (${{ matrix.os }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025-vs2026]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS cross-compilation target
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build TUI
        run: cargo build -p agent-tui --release

      - name: Build TUI (macOS x86_64)
        if: runner.os == 'macOS'
        run: cargo build -p agent-tui --release --target x86_64-apple-darwin

      - name: Package TUI (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -czf "dist/Kairox-TUI-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" \
            -C target/release agent-tui

      - name: Package TUI (macOS – aarch64)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          tar -czf "dist/Kairox-TUI-${GITHUB_REF_NAME}-macos-aarch64.tar.gz" \
            -C target/release agent-tui

      - name: Package TUI (macOS – x86_64)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          tar -czf "dist/Kairox-TUI-${GITHUB_REF_NAME}-macos-x86_64.tar.gz" \
            -C target/x86_64-apple-darwin/release agent-tui

      - name: Package TUI (Windows)
        if: runner.os == 'Windows'
        env:
          KAIROX_ARCH: x86_64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path target/release/agent-tui.exe `
            -DestinationPath "dist/Kairox-TUI-${env:GITHUB_REF_NAME}-windows-${env:KAIROX_ARCH}.zip" -Force

      - name: Upload TUI package to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*

  tauri-build:
    name: Tauri build (${{ matrix.os }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025-vs2026]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install repo tooling deps
        run: bun ci

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          projectPath: apps/agent-gui
          tagName: ${{ github.ref_name }}
          releaseName: "Kairox ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          assetNamePattern: Kairox_${{ github.ref_name }}_[platform]_[arch][ext]
          tauriScript: bun tauri
          updaterJsonPreferNsis: true

  checksums:
    name: Generate SHA256 checksums
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [tui-build, tauri-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip *.dmg *.msi *.AppImage* *.deb *.rpm 2>/dev/null \
            | sort > ../SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat ../SHA256SUMS.txt

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: SHA256SUMS.txt

  publish-updater-json:
    name: Publish updater latest.json
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [tui-build, tauri-build, checksums]
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: dist

      - name: Generate latest.json for Tauri updater
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Collect signature files and download URLs into maps keyed by
          # the Tauri updater platform identifier
          # (`darwin-aarch64`, `darwin-x86_64`, `linux-x86_64`,
          # `linux-aarch64`, `windows-x86_64`, ...).
          #
          # IMPORTANT: both associative arrays MUST be declared with
          # `declare -A` before any subscripted assignment, otherwise
          # `URL_MAP["key"]=...` becomes an indexed-array access with a
          # non-numeric subscript and aborts the step under `set -e`.
          declare -A SIG_MAP
          declare -A URL_MAP

          # Tauri's actual artifact naming uses different arch tokens per
          # platform (e.g. `_linux_amd64.AppImage`, `_windows_x64.msi`,
          # `_darwin_aarch64.dmg`). The previous regex `aarch64|x86_64`
          # didn't match `amd64` / `x64`, and combined with `set -e` the
          # failed `grep` in `arch=$(... | grep ...)` aborted the whole
          # step before the `[ -z "$arch" ]` fallback could run.
          # We now extract any known arch token, allow `grep` to fail
          # gracefully via `|| true`, then normalize to the Tauri updater
          # convention.
          normalize_arch() {
            case "$1" in
              aarch64|arm64) echo "aarch64" ;;
              x86_64|amd64|x64) echo "x86_64" ;;
              i686|x86) echo "i686" ;;
              *) echo "" ;;
            esac
          }

          for sig in dist/*.sig; do
            [ -f "$sig" ] || continue
            base=$(basename "$sig" .sig)
            sig_content=$(cat "$sig")

            # Match platform from the filename.
            # Tauri artifacts follow pattern:
            # Kairox_${TAG}_[platform]_[arch][ext].sig
            # e.g. Kairox_v0.16.0_darwin_aarch64.dmg.sig
            #      Kairox_v0.16.0_linux_amd64.AppImage.sig
            #      Kairox_v0.16.0_windows_x64.msi.sig
            if echo "$base" | grep -q "_darwin_\|_macos_"; then
              platform_prefix="darwin"
              default_arch="aarch64"
            elif echo "$base" | grep -q "_linux_"; then
              platform_prefix="linux"
              default_arch="x86_64"
            elif echo "$base" | grep -q "_windows_"; then
              platform_prefix="windows"
              default_arch="x86_64"
            else
              continue
            fi

            # Skip RPM signatures: there is no AppImage-equivalent Tauri
            # updater target for `.rpm`, and on x86_64 it would collide
            # with the `.AppImage` entry under the same `linux-x86_64`
            # key, overwriting whichever runs last.
            case "$base" in
              *.rpm) continue ;;
            esac

            # Extract arch token; tolerate non-match under `set -e`.
            raw_arch=$(echo "$base" | grep -oE 'aarch64|arm64|x86_64|amd64|x64|i686|x86' || true)
            arch=$(normalize_arch "$raw_arch")
            [ -z "$arch" ] && arch="$default_arch"

            platform_key="${platform_prefix}-${arch}"

            # If multiple bundle types share the same platform key
            # (e.g. `.AppImage` and `.deb` both map to `linux-x86_64`),
            # prefer the first one we see and skip duplicates so the
            # updater manifest stays deterministic.
            if [ -n "${SIG_MAP[$platform_key]:-}" ]; then
              echo "skip duplicate platform key '${platform_key}' for ${base}" >&2
              continue
            fi

            SIG_MAP["${platform_key}"]="${sig_content}"

            asset_name="${base%.sig}"
            # GitHub release download URL pattern
            asset_url="https://github.com/Z-Only/kairox/releases/download/${TAG}/${asset_name}"
            URL_MAP["${platform_key}"]="${asset_url}"
          done

          if [ "${#SIG_MAP[@]}" -eq 0 ]; then
            echo "::error::No .sig files found in dist/, cannot build latest.json" >&2
            ls -la dist/ >&2 || true
            exit 1
          fi

          # Build the JSON
          echo "{" > dist/latest.json
          echo "  \"version\": \"${TAG#v}\"," >> dist/latest.json
          echo "  \"notes\": \"See https://github.com/Z-Only/kairox/releases/tag/${TAG}\"," >> dist/latest.json
          echo "  \"pub_date\": \"${PUB_DATE}\"," >> dist/latest.json
          echo "  \"platforms\": {" >> dist/latest.json

          first=true
          for key in "${!SIG_MAP[@]}"; do
            [ "$first" = true ] || echo "," >> dist/latest.json
            first=false
            echo "    \"${key}\": {" >> dist/latest.json
            echo "      \"signature\": \"${SIG_MAP[$key]}\"," >> dist/latest.json
            echo "      \"url\": \"${URL_MAP[$key]}\"" >> dist/latest.json
            echo -n "    }" >> dist/latest.json
          done

          echo "" >> dist/latest.json
          echo "  }" >> dist/latest.json
          echo "}" >> dist/latest.json

          echo "--- latest.json ---"
          cat dist/latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/latest.json

  # Smoke test for workflow changes: runs on PRs that modify workflow files
  # to validate that all actions used in release-build.yml can initialize and
  # the core build toolchain works, without actually publishing a release.
  workflow-smoke-test:
    name: Workflow smoke test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Linux system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install repo tooling deps
        run: bun ci

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Verify git-cliff works
        run: |
          # In PR context HEAD may be a merge commit; use origin/main as the range
          git cliff --strip header origin/main..HEAD || git cliff --strip header HEAD~1..HEAD || git cliff --strip header --unreleased

      - name: Build TUI (release)
        run: cargo build -p agent-tui --release

      - name: Build GUI web
        working-directory: apps/agent-gui
        run: bun run build
