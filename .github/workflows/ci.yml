name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install repo tooling deps
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

  lint-rust:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci

      - name: Install Linux system deps for Tauri crates
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  lint-web:
    name: Lint (web)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install repo tooling deps
        run: pnpm install --frozen-lockfile

      - name: Run Oxlint
        run: npx oxlint

      - name: Run Stylelint
        run: pnpm run lint:style

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci

      - name: Install Linux system deps for Tauri crates
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install MCP fixture deps
        run: cd crates/agent-mcp/tests/fixtures && npm install

      - name: Run tests
        run: cargo test --workspace --all-targets

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install repo tooling deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/agent-gui
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/agent-gui
        run: pnpm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/agent-gui/playwright-report/
          retention-days: 7

  type-sync:
    name: Type sync check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci

      - name: Install Linux system deps for Tauri crates
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install repo tooling deps
        run: pnpm install --frozen-lockfile

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Regenerate types
        run: just gen-types

      - name: Check generated types are in sync
        run: git diff --exit-code apps/agent-gui/src/generated/

  build-tui:
    name: Build TUI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build TUI
        run: cargo build -p agent-tui

  build-gui:
    name: Build GUI web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install repo tooling deps
        run: pnpm install --frozen-lockfile

      - name: Build GUI web
        working-directory: apps/agent-gui
        run: pnpm run build

  live-model-tests:
    name: Live model tests (GitHub Models)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci

      - name: Run live model integration test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test -p agent-runtime --features live-model-tests --test live_model_tests -- --nocapture

  tauri-pilot-e2e:
    name: Tauri pilot E2E (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci-pilot-${{ matrix.os }}

      - name: Install Linux system deps for Tauri and xvfb
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Install repo tooling deps
        run: pnpm install --frozen-lockfile

      - name: Install tauri-pilot CLI
        run: cargo install --git https://github.com/mpiton/tauri-pilot tauri-pilot-cli --locked

      - name: Build Tauri debug binary with pilot feature
        run: pnpm --filter agent-gui exec -- tauri build --debug --no-bundle --features pilot

      - name: Run pilot E2E scenarios (Linux, with xvfb)
        if: matrix.os == 'ubuntu-latest'
        # The job-level `timeout-minutes: 30` already caps runtime. We avoid
        # GNU `timeout(1)` here because it is not available on macOS runners
        # by default, and we want both platforms on the same code path.
        run: xvfb-run -a scripts/run-pilot-tests.sh

      - name: Run pilot E2E scenarios (macOS)
        if: matrix.os == 'macos-latest'
        run: scripts/run-pilot-tests.sh

      - name: Upload pilot JUnit results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: pilot-results-${{ matrix.os }}
          path: pilot-results/
          retention-days: 7

      - name: Upload pilot failure artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: tauri-pilot-failures-${{ matrix.os }}
          path: tauri-pilot-failures/
          retention-days: 7

  ci-success:
    name: CI
    if: ${{ always() }}
    needs:
      [
        format,
        lint-rust,
        lint-web,
        test,
        test-e2e,
        type-sync,
        build-tui,
        build-gui,
        live-model-tests,
        tauri-pilot-e2e
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
