name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.paths.outputs.rust }}
      web: ${{ steps.paths.outputs.web }}
      typegen: ${{ steps.paths.outputs.typegen }}
      tui: ${{ steps.paths.outputs.tui }}
      desktop: ${{ steps.paths.outputs.desktop }}
      live_models: ${{ steps.paths.outputs.live_models }}
      live_pilot: ${{ steps.paths.outputs.live_pilot }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          head="${{ github.sha }}"

          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            files="$(git ls-tree -r --name-only "$head")"
          else
            git cat-file -e "$base^{commit}" 2>/dev/null || git fetch --no-tags --depth=1 origin "$base"
            git cat-file -e "$head^{commit}" 2>/dev/null || git fetch --no-tags --depth=1 origin "$head"
            files="$(git diff --name-only "$base" "$head")"
          fi

          if [[ -z "$files" ]]; then
            rust=true
            web=true
            typegen=true
            tui=true
            desktop=true
            live_models=true
            live_pilot=true
          else
            rust=false
            web=false
            typegen=false
            tui=false
            desktop=false
            live_models=false
            live_pilot=false

            while IFS= read -r file; do
              case "$file" in
                .github/workflows/ci.yml)
                  rust=true
                  web=true
                  typegen=true
                  tui=true
                  desktop=true
                  live_models=true
                  live_pilot=true
                  ;;
                Cargo.toml|Cargo.lock|crates/**|apps/agent-gui/src-tauri/**|scripts/check-rust-coverage.mjs|scripts/run-rust-coverage.sh)
                  rust=true
                  desktop=true
                  ;;
              esac

              case "$file" in
                package.json|bun.lock|scripts/check-rust-coverage.mjs|scripts/run-rust-coverage.sh|apps/agent-gui/package.json|apps/agent-gui/bun.lock|apps/agent-gui/index.html|apps/agent-gui/playwright.config.*|apps/agent-gui/vite.config.*|apps/agent-gui/vitest.config.*|apps/agent-gui/tsconfig*.json|apps/agent-gui/src/**|apps/agent-gui/e2e/**|apps/agent-gui/public/**)
                  web=true
                  ;;
              esac

              case "$file" in
                Cargo.toml|Cargo.lock|Justfile|crates/agent-core/**|crates/agent-config/**|crates/agent-memory/**|crates/agent-mcp/**|crates/agent-models/**|apps/agent-gui/src-tauri/**|apps/agent-gui/src/generated/**)
                  typegen=true
                  ;;
              esac

              case "$file" in
                Cargo.toml|Cargo.lock|crates/**)
                  tui=true
                  ;;
              esac

              case "$file" in
                package.json|bun.lock|Cargo.toml|Cargo.lock|crates/**|apps/agent-gui/package.json|apps/agent-gui/src/**|apps/agent-gui/src-tauri/**|apps/agent-gui/e2e-pilot/**|scripts/run-pilot-tests.sh)
                  desktop=true
                  ;;
              esac

              case "$file" in
                Cargo.toml|Cargo.lock|crates/agent-core/**|crates/agent-config/**|crates/agent-models/**|crates/agent-runtime/**|fixtures/test-profiles/**)
                  live_models=true
                  ;;
              esac

              case "$file" in
                Cargo.toml|Cargo.lock|crates/agent-config/**|crates/agent-models/**|crates/agent-runtime/**|apps/agent-gui/src-tauri/**|apps/agent-gui/e2e-pilot/**|scripts/run-pilot-tests.sh|fixtures/test-profiles/**)
                  live_pilot=true
                  ;;
                apps/agent-gui/src/components/ChatComposer.vue|apps/agent-gui/src/components/ChatPanel.vue|apps/agent-gui/src/composables/useTauriEvents.ts|apps/agent-gui/src/stores/session*.ts|apps/agent-gui/src/stores/taskGraph.ts|apps/agent-gui/src/stores/trace.ts)
                  live_pilot=true
                  ;;
              esac
            done <<< "$files"
          fi

          {
            echo "rust=$rust"
            echo "web=$web"
            echo "typegen=$typegen"
            echo "tui=$tui"
            echo "desktop=$desktop"
            echo "live_models=$live_models"
            echo "live_pilot=$live_pilot"
          } >> "$GITHUB_OUTPUT"

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install repo tooling deps
        run: bun ci

      - name: Check formatting
        run: bun run format:check

  lint-rust:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci

      - name: Install Linux system deps for Tauri crates
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  lint-web:
    name: Lint (web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install repo tooling deps
        run: bun ci

      - name: Run Oxlint
        run: bun run lint:oxlint

      - name: Run Stylelint
        run: bun run lint:style

  test-e2e:
    name: E2E Tests
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install repo tooling deps
        run: bun ci

      - name: Install Playwright browsers
        working-directory: apps/agent-gui
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/agent-gui
        run: bun run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/agent-gui/playwright-report/
          retention-days: 7

  coverage-rust:
    name: Coverage (Rust)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-coverage

      - name: Install Linux system deps for Tauri crates
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install MCP fixture deps
        run: bun install --cwd crates/agent-mcp/tests/fixtures --no-save

      - name: Run Rust coverage gate
        run: bun run coverage:rust

      - name: Upload Rust coverage summary
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: rust-coverage-summary
          path: target/coverage/rust.lcov
          retention-days: 7

  coverage-web:
    name: Coverage (web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install repo tooling deps
        run: bun ci

      - name: Run web coverage gate
        run: bun run coverage:web

      - name: Upload web coverage report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: web-coverage
          path: apps/agent-gui/coverage/
          retention-days: 7

  type-sync:
    name: Type sync check
    needs: changes
    if: needs.changes.outputs.typegen == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci

      - name: Install Linux system deps for Tauri crates
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install repo tooling deps
        run: bun ci

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Regenerate types
        run: just gen-types

      - name: Check generated types are in sync
        run: git diff --exit-code apps/agent-gui/src/generated/

  build-tui:
    name: Build TUI
    needs: changes
    if: needs.changes.outputs.tui == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci

      - name: Build TUI
        run: cargo build -p agent-tui

      - name: Run TUI PTY smoke
        env:
          KAIROX_TUI_BIN: target/debug/agent-tui
        run: cargo test -p agent-tui --test terminal_pty_smoke -- --ignored --nocapture

  build-gui:
    name: Build GUI web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install repo tooling deps
        run: bun ci

      - name: Build GUI web
        working-directory: apps/agent-gui
        run: bun run build

  live-model-tests:
    name: Live model tests (GitHub Models)
    needs: changes
    if: needs.changes.outputs.live_models == 'true' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci

      - name: Run live model integration test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test -p agent-runtime --features live-model-tests --test live_model_tests -- --nocapture

  tauri-pilot-e2e:
    name: Tauri pilot E2E (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Remove Homebrew rustup (macOS GH runner workaround)
        if: matrix.os == 'macos-latest'
        run: |
          # Homebrew-installed rustup has self-update disabled and can
          # cause `cargo` to resolve to `rustup-init` on Apple Silicon.
          if command -v brew &>/dev/null && brew list --formula rustup &>/dev/null 2>&1; then
            brew uninstall --ignore-dependencies rustup rustup-init 2>/dev/null || true
          fi
          # Also clean up any broken cargo symlinks
          rm -f /usr/local/bin/cargo /usr/local/bin/rustc /usr/local/bin/rustup 2>/dev/null || true
          rm -f /opt/homebrew/bin/cargo /opt/homebrew/bin/rustc /opt/homebrew/bin/rustup 2>/dev/null || true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci-pilot-${{ matrix.os }}-v2

      - name: Cache tauri-pilot CLI
        id: cache-tauri-pilot
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/tauri-pilot
          key: tauri-pilot-${{ matrix.os }}-v0.5.1

      - name: Install Linux system deps for Tauri and xvfb
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Install repo tooling deps
        run: bun ci

      - name: Install tauri-pilot CLI
        if: steps.cache-tauri-pilot.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/mpiton/tauri-pilot --tag v0.5.1 tauri-pilot-cli --locked

      - name: Build Tauri debug binary with pilot feature
        run: bun --filter agent-gui tauri build --debug --no-bundle --features pilot

      - name: Run pilot E2E scenarios (Linux, with xvfb)
        if: matrix.os == 'ubuntu-latest'
        # The job-level `timeout-minutes: 30` already caps runtime. We avoid
        # GNU `timeout(1)` here because it is not available on macOS runners
        # by default, and we want both platforms on the same code path.
        run: xvfb-run -a scripts/run-pilot-tests.sh

      - name: Run pilot E2E scenarios (macOS)
        if: matrix.os == 'macos-latest'
        run: scripts/run-pilot-tests.sh

      - name: Upload pilot JUnit results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: pilot-results-${{ matrix.os }}
          path: pilot-results/
          retention-days: 7

      - name: Upload pilot failure artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: tauri-pilot-failures-${{ matrix.os }}
          path: tauri-pilot-failures/
          retention-days: 7

  tauri-pilot-live-e2e:
    name: Tauri pilot live E2E (GitHub Models)
    needs: changes
    if: needs.changes.outputs.live_pilot == 'true' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: rust-ci-pilot-live-ubuntu-v2

      - name: Cache tauri-pilot CLI
        id: cache-tauri-pilot
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/tauri-pilot
          key: tauri-pilot-ubuntu-latest-v0.5.1

      - name: Install Linux system deps for Tauri and xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Install repo tooling deps
        run: bun ci

      - name: Install tauri-pilot CLI
        if: steps.cache-tauri-pilot.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/mpiton/tauri-pilot --tag v0.5.1 tauri-pilot-cli --locked

      - name: Build Tauri debug binary with pilot feature
        run: bun --filter agent-gui tauri build --debug --no-bundle --features pilot

      - name: Run live pilot E2E scenarios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KAIROX_PILOT_LIVE_MODELS: "1"
        run: xvfb-run -a scripts/run-pilot-tests.sh

      - name: Upload live pilot JUnit results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: pilot-live-results-ubuntu-latest
          path: pilot-results/
          retention-days: 7

      - name: Upload live pilot failure artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: tauri-pilot-live-failures-ubuntu-latest
          path: tauri-pilot-failures/
          retention-days: 7

  ci-success:
    name: CI
    if: ${{ always() }}
    needs:
      [
        changes,
        format,
        lint-rust,
        lint-web,
        test-e2e,
        coverage-rust,
        coverage-web,
        type-sync,
        build-tui,
        build-gui,
        live-model-tests,
        tauri-pilot-e2e,
        tauri-pilot-live-e2e
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
