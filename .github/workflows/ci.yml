name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/agent-gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system deps for Tauri crates
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install repo tooling deps
        run: npm ci

      - name: Reinstall GUI deps for platform-native optional packages
        working-directory: apps/agent-gui
        run: |
          node -e "require('fs').rmSync('node_modules', { recursive: true, force: true })"
          npm install

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Build TUI
        run: cargo build -p agent-tui

      - name: Build GUI web
        working-directory: apps/agent-gui
        run: npm run build
