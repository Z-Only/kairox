name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
    branches: [main]
    types: [checks_requested]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.paths.outputs.rust }}
      web: ${{ steps.paths.outputs.web }}
      typegen: ${{ steps.paths.outputs.typegen }}
      tui: ${{ steps.paths.outputs.tui }}
      desktop: ${{ steps.paths.outputs.desktop }}
      live_models: ${{ steps.paths.outputs.live_models }}
      live_pilot: ${{ steps.paths.outputs.live_pilot }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"
          if [[ "$event_name" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          elif [[ "$event_name" == "merge_group" ]]; then
            base="${{ github.event.merge_group.base_sha }}"
          elif [[ "$event_name" == "workflow_dispatch" ]]; then
            git fetch --no-tags origin main:refs/remotes/origin/main
            base="$(git merge-base origin/main "${{ github.sha }}" 2>/dev/null || true)"
          else
            base="${{ github.event.before }}"
          fi
          head="${{ github.sha }}"

          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            files="$(git ls-tree -r --name-only "$head")"
          else
            git cat-file -e "$base^{commit}" 2>/dev/null || git fetch --no-tags --depth=1 origin "$base"
            git cat-file -e "$head^{commit}" 2>/dev/null || git fetch --no-tags --depth=1 origin "$head"
            files="$(git diff --name-only "$base" "$head")"
          fi

          if [[ -z "$files" ]]; then
            rust=true
            web=true
            typegen=true
            tui=true
            desktop=true
            live_models=true
            live_pilot=true
          else
            rust=false
            web=false
            typegen=false
            tui=false
            desktop=false
            live_models=false
            live_pilot=false

            while IFS= read -r file; do
              case "$file" in
                .github/workflows/**|.github/actions/**)
                  rust=true
                  web=true
                  typegen=true
                  tui=true
                  desktop=true
                  live_models=true
                  live_pilot=true
                  ;;
                Cargo.toml|Cargo.lock|crates/**|apps/agent-gui/src-tauri/**|scripts/check-rust-coverage.mjs|scripts/run-rust-coverage.sh)
                  rust=true
                  desktop=true
                  ;;
              esac

              case "$file" in
                package.json|bun.lock|scripts/check-rust-coverage.mjs|scripts/run-rust-coverage.sh|apps/agent-gui/package.json|apps/agent-gui/bun.lock|apps/agent-gui/index.html|apps/agent-gui/playwright.config.*|apps/agent-gui/vite.config.*|apps/agent-gui/vitest.config.*|apps/agent-gui/tsconfig*.json|apps/agent-gui/src/**|apps/agent-gui/e2e/**|apps/agent-gui/public/**)
                  web=true
                  ;;
              esac

              case "$file" in
                Cargo.toml|Cargo.lock|Justfile|crates/agent-core/**|crates/agent-config/**|crates/agent-memory/**|crates/agent-mcp/**|crates/agent-models/**|apps/agent-gui/src-tauri/**|apps/agent-gui/src/generated/**)
                  typegen=true
                  ;;
              esac

              case "$file" in
                Cargo.toml|Cargo.lock|crates/**)
                  tui=true
                  ;;
              esac

              case "$file" in
                package.json|bun.lock|Cargo.toml|Cargo.lock|crates/**|apps/agent-gui/package.json|apps/agent-gui/src/**|apps/agent-gui/src-tauri/**|apps/agent-gui/e2e-pilot/**|scripts/run-pilot-tests.sh)
                  desktop=true
                  ;;
              esac

              # Live jobs hit the real GitHub Models endpoint and share an
              # anti-abuse throttle across the repository. Trigger only on
              # production-source changes that can plausibly alter
              # provider/router/runtime behavior, plus the live test files
              # themselves. Test-only churn under `crates/*/tests/**` should
              # not burn live quota or stall unrelated PRs.
              case "$file" in
                Cargo.toml|Cargo.lock|crates/agent-core/src/**|crates/agent-config/src/**|crates/agent-models/src/**|crates/agent-runtime/src/**|fixtures/test-profiles/**)
                  live_models=true
                  ;;
                crates/agent-runtime/tests/live_model_tests.rs)
                  live_models=true
                  ;;
              esac

              case "$file" in
                Cargo.toml|Cargo.lock|crates/agent-config/src/**|crates/agent-models/src/**|crates/agent-runtime/src/**|apps/agent-gui/src-tauri/**|apps/agent-gui/e2e-pilot/**|scripts/run-pilot-tests.sh|fixtures/test-profiles/**)
                  live_pilot=true
                  ;;
                apps/agent-gui/src/components/ChatComposer.vue|apps/agent-gui/src/components/ChatPanel.vue|apps/agent-gui/src/composables/useTauriEvents.ts|apps/agent-gui/src/stores/session*.ts|apps/agent-gui/src/stores/taskGraph.ts|apps/agent-gui/src/stores/trace.ts)
                  live_pilot=true
                  ;;
              esac
            done <<< "$files"
          fi

          {
            echo "rust=$rust"
            echo "web=$web"
            echo "typegen=$typegen"
            echo "tui=$tui"
            echo "desktop=$desktop"
            echo "live_models=$live_models"
            echo "live_pilot=$live_pilot"
          } >> "$GITHUB_OUTPUT"

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun + Node.js
        uses: ./.github/actions/setup-bun-node

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          skip-cache: "true"

      - name: Check formatting
        run: bun run format:check

      - name: Check no inline test modules
        run: bun run lint:no-inline-tests

      - name: Check release docs
        run: bun run release-docs:check

      - name: Run script tests
        run: bun run test:scripts

  lint-rust:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: clippy

      - name: Install Tauri deps
        uses: ./.github/actions/install-tauri-deps

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  lint-web:
    name: Lint (web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun + Node.js
        uses: ./.github/actions/setup-bun-node

      - name: Run Oxlint
        run: bun run lint:oxlint

      - name: Run Stylelint
        run: bun run lint:style

  test-e2e:
    name: E2E Tests
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun + Node.js
        uses: ./.github/actions/setup-bun-node

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        working-directory: apps/agent-gui
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/agent-gui
        run: bun run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/agent-gui/playwright-report/
          retention-days: 7

  coverage-rust:
    name: Coverage (Rust)
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          components: llvm-tools-preview
          cache-shared-key: rust-coverage

      - name: Install Tauri deps
        uses: ./.github/actions/install-tauri-deps

      - name: Setup Bun + Node.js
        uses: ./.github/actions/setup-bun-node

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install MCP fixture deps
        run: bun install --cwd crates/agent-mcp/tests/fixtures --no-save

      - name: Free disk space for instrumented build
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Run Rust coverage gate
        run: bun run coverage:rust

      - name: Upload Rust coverage summary
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: rust-coverage-summary
          path: target/coverage/rust.lcov
          retention-days: 7

  coverage-web:
    name: Coverage (web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun + Node.js
        uses: ./.github/actions/setup-bun-node

      - name: Run web coverage gate
        run: bun run coverage:web

      - name: Upload web coverage report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: web-coverage
          path: apps/agent-gui/coverage/
          retention-days: 7

  type-sync:
    name: Type sync check
    needs: changes
    if: needs.changes.outputs.typegen == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun + Node.js
        uses: ./.github/actions/setup-bun-node

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install Tauri deps
        uses: ./.github/actions/install-tauri-deps

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Regenerate types
        run: just gen-types

      - name: Check generated types are in sync
        run: git diff --exit-code apps/agent-gui/src/generated/

  build-tui:
    name: Build TUI
    needs: changes
    if: needs.changes.outputs.tui == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install desktop interaction deps
        uses: ./.github/actions/install-tauri-deps

      - name: Build TUI
        run: cargo build -p agent-tui

      - name: Run TUI PTY smoke
        env:
          KAIROX_TUI_BIN: target/debug/agent-tui
        run: cargo test -p agent-tui --test terminal_pty_smoke -- --ignored --nocapture

  build-gui:
    name: Build GUI web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun + Node.js
        uses: ./.github/actions/setup-bun-node

      - name: Build GUI web
        working-directory: apps/agent-gui
        run: bun run build

  eval-smoke:
    name: kairox-eval smoke
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install desktop interaction deps
        uses: ./.github/actions/install-tauri-deps

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Run kairox-eval smoke fixtures
        run: just eval-smoke

      - name: Upload eval-smoke summaries
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: eval-smoke-summary
          path: target/eval-smoke/**/summary.json
          retention-days: 7

  live-model-tests:
    name: Live model tests (GitHub Models)
    needs: changes
    if: needs.changes.outputs.live_models == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository)
    continue-on-error: true
    # Serialize across every PR + push so concurrent live jobs do not
    # trigger GitHub Models' anti-abuse "scraping" throttle, which is
    # repository-scoped and distinct from the documented RPM/RPD quota.
    concurrency:
      group: live-models-${{ github.repository }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install system deps (xcap requires libpipewire)
        uses: ./.github/actions/install-tauri-deps

      - name: Run live model integration test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo test -p agent-runtime --features live-model-tests --test live_model_tests -- --nocapture

  tauri-pilot-e2e:
    name: Tauri pilot E2E (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun + Node.js
        uses: ./.github/actions/setup-bun-node

      - name: Remove Homebrew rustup (macOS GH runner workaround)
        if: matrix.os == 'macos-latest'
        run: |
          if command -v brew &>/dev/null && brew list --formula rustup &>/dev/null 2>&1; then
            brew uninstall --ignore-dependencies rustup rustup-init 2>/dev/null || true
          fi
          rm -f /usr/local/bin/cargo /usr/local/bin/rustc /usr/local/bin/rustup 2>/dev/null || true
          rm -f /opt/homebrew/bin/cargo /opt/homebrew/bin/rustc /opt/homebrew/bin/rustup 2>/dev/null || true

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-shared-key: rust-ci-pilot-${{ matrix.os }}-v2

      - name: Cache tauri-pilot CLI
        id: cache-tauri-pilot
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/tauri-pilot
          key: tauri-pilot-${{ matrix.os }}-v0.7.0

      - name: Install Tauri deps
        uses: ./.github/actions/install-tauri-deps
        with:
          extra-packages: xvfb

      - name: Install tauri-pilot CLI
        if: steps.cache-tauri-pilot.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/mpiton/tauri-pilot --tag v0.7.0 tauri-pilot-cli --locked

      - name: Run pilot E2E scenarios (Linux, with xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a scripts/run-pilot-tests.sh

      - name: Run pilot E2E scenarios (macOS)
        if: matrix.os == 'macos-latest'
        run: scripts/run-pilot-tests.sh

      - name: Upload pilot JUnit results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: pilot-results-${{ matrix.os }}
          path: pilot-results/
          retention-days: 7

      - name: Upload pilot failure artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: tauri-pilot-failures-${{ matrix.os }}
          path: tauri-pilot-failures/
          retention-days: 7

  tauri-pilot-live-e2e:
    name: Tauri pilot live E2E (GitHub Models)
    needs: changes
    if: needs.changes.outputs.live_pilot == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository)
    continue-on-error: true
    # Share the live-models serialization group: the pilot live scenarios
    # also exercise the GitHub Models endpoint and contribute to the same
    # anti-abuse throttle.
    concurrency:
      group: live-models-${{ github.repository }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun + Node.js
        uses: ./.github/actions/setup-bun-node

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-shared-key: rust-ci-pilot-live-ubuntu-v2

      - name: Cache tauri-pilot CLI
        id: cache-tauri-pilot
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/tauri-pilot
          key: tauri-pilot-ubuntu-latest-v0.7.0

      - name: Install Tauri deps
        uses: ./.github/actions/install-tauri-deps
        with:
          extra-packages: xvfb

      - name: Install tauri-pilot CLI
        if: steps.cache-tauri-pilot.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/mpiton/tauri-pilot --tag v0.7.0 tauri-pilot-cli --locked

      - name: Run live pilot E2E scenarios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KAIROX_PILOT_LIVE_MODELS: "1"
        run: xvfb-run -a scripts/run-pilot-tests.sh

      - name: Upload live pilot JUnit results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: pilot-live-results-ubuntu-latest
          path: pilot-results/
          retention-days: 7

      - name: Upload live pilot failure artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: tauri-pilot-live-failures-ubuntu-latest
          path: tauri-pilot-failures/
          retention-days: 7

  ci-success:
    name: CI
    if: ${{ always() }}
    needs:
      [
        changes,
        format,
        lint-rust,
        lint-web,
        test-e2e,
        coverage-rust,
        coverage-web,
        type-sync,
        build-tui,
        build-gui,
        eval-smoke,
        tauri-pilot-e2e
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        # Only merge-blocking jobs are aggregated here. Live GitHub Models jobs
        # run independently as informational checks so they do not delay merges.
        run: |
          # Collect results from all required (non-flaky) jobs
          required_results=(
            "${{ needs.changes.result }}"
            "${{ needs.format.result }}"
            "${{ needs.lint-rust.result }}"
            "${{ needs.lint-web.result }}"
            "${{ needs.test-e2e.result }}"
            "${{ needs.coverage-rust.result }}"
            "${{ needs.coverage-web.result }}"
            "${{ needs.type-sync.result }}"
            "${{ needs.build-tui.result }}"
            "${{ needs.build-gui.result }}"
            "${{ needs.eval-smoke.result }}"
            "${{ needs.tauri-pilot-e2e.result }}"
          )
          for result in "${required_results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::Required CI job did not pass: $result"
              exit 1
            fi
          done
