name: Verify Build (Manual)

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Target OS"
        required: true
        type: choice
        options:
          - macos-latest
          - ubuntu-latest
          - windows-latest
        default: "macos-latest"

permissions:
  contents: read

jobs:
  verify-tauri-build:
    name: Verify Tauri build (${{ github.event.inputs.os }})
    runs-on: ${{ github.event.inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install repo tooling deps
        run: bun ci

      - name: Setup Tauri signing key
        run: |
          echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > /tmp/tauri.key
          echo "TAURI_SIGNING_PRIVATE_KEY_PATH=/tmp/tauri.key" >> "$GITHUB_ENV"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build Tauri app with updater artifacts
        working-directory: apps/agent-gui
        run: bun tauri build

      - name: List build artifacts
        if: always()
        run: |
          echo "=== Bundle artifacts ==="
          find target/release/bundle -type f -ls 2>/dev/null || true

      - name: Show updater artifacts
        if: always()
        run: |
          echo "=== Updater signature files ==="
          find target/release/bundle -name "*.sig" -o -name "*.tar.gz" 2>/dev/null | while read f; do
            echo "  $f ($(wc -c < "$f") bytes)"
          done
          echo ""
          echo "=== Signature file contents ==="
          for sig in $(find target/release/bundle -name "*.sig" 2>/dev/null); do
            echo "--- $(basename "$sig") ---"
            cat "$sig"
            echo ""
          done
