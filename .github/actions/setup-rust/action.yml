name: Setup Rust
description: Install Rust toolchain with optional components and cargo cache

inputs:
  toolchain:
    description: Rust toolchain channel
    required: false
    default: stable
  components:
    description: Comma-separated rustup components (e.g. clippy, rustfmt)
    required: false
    default: ""
  cache-shared-key:
    description: Shared key for Swatinem/rust-cache
    required: false
    default: rust-ci
  skip-cache:
    description: Skip cargo caching (e.g. format-only jobs that never compile)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - name: Cache cargo
      if: inputs.skip-cache != 'true'
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: ${{ inputs.cache-shared-key }}
