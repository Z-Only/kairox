name: Install Tauri Linux dependencies
description: Install system libraries required to build Tauri on Ubuntu

inputs:
  extra-packages:
    description: Additional apt packages to install (space-separated)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Linux system deps for Tauri crates
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libglib2.0-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf \
          libpipewire-0.3-dev \
          libwayland-dev \
          libxdo-dev \
          libgbm-dev \
          ${{ inputs.extra-packages }}
