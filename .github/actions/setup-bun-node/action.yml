name: Setup Bun + Node.js
description: Install Bun (version from package.json) and Node.js 22, then run bun ci

inputs:
  skip-install:
    description: Skip bun ci (e.g. when only Node.js runtime is needed)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: package.json

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: Install repo tooling deps
      if: inputs.skip-install != 'true'
      shell: bash
      run: bun ci
